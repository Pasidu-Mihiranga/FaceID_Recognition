version: '3.8'

services:
  faceid-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: faceid-system
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - FLASK_PORT=5000
      - FACE_DETECTOR=opencv_dnn
      - RECOGNITION_THRESHOLD=0.45
      - LEARNING_THRESHOLD=0.7
      - ENABLE_JSON_LOGGING=true
    restart: unless-stopped
