<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FaceID System{% endblock %}</title>
    <!-- Neumorphism CSS System -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="neo-nav">
        <a class="nav-brand" href="{{ url_for('index') }}">
            <i class="fa-solid fa-face-viewfinder"></i> FaceID
        </a>
        <div class="nav-links" id="navLinks">
            <a class="nav-link" href="{{ url_for('register_page') }}">Register</a>
            <a class="nav-link" href="{{ url_for('video_register') }}">Video Register</a>
            <a class="nav-link" href="{{ url_for('recognize_page') }}">Recognize</a>
            <a class="nav-link" href="{{ url_for('dashboard') }}">Dashboard</a>
        </div>
        <button class="hamburger" id="hamburgerMenu">
            <i class="fa-solid fa-bars"></i>
        </button>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 FaceID System | Designed with Neumorphism</p>
        </div>
    </footer>

    <script>
        document.getElementById('hamburgerMenu').addEventListener('click', function() {
            document.getElementById('navLinks').classList.toggle('active');
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
