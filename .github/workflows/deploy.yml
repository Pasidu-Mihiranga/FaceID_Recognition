name: FaceID CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
        pip install scikit-learn opencv-python-headless pillow imutils flask flask-cors pandas matplotlib seaborn pickle-mixin python-dotenv flask-socketio eventlet

    - name: Run Unit Tests
      run: |
        python -m unittest tests/test_database.py tests/test_detection.py tests/test_recognition.py tests/test_api.py

  test-enrollment:
    name: Enrollment Workflow E2E Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
        pip install scikit-learn opencv-python-headless pillow imutils flask flask-cors pandas matplotlib seaborn pickle-mixin python-dotenv flask-socketio eventlet

    - name: Run Enrollment Workflow Tests
      run: |
        python -m unittest tests/test_enrollment_workflow.py

  test-recognition:
    name: Recognition Workflow E2E Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
        pip install scikit-learn opencv-python-headless pillow imutils flask flask-cors pandas matplotlib seaborn pickle-mixin python-dotenv flask-socketio eventlet

    - name: Run Recognition Workflow Tests
      run: |
        python -m unittest tests/test_recognition_workflow.py

  deploy:
    name: Deploy Master Branch to VPS / build-and-deploy
    runs-on: ubuntu-latest
    needs: [test, test-enrollment, test-recognition]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Copy Files to VPS via Rsync
      uses: easingthemes/ssh-deploy@main
      env:
        SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
        ARGS: "-rlgoDzc --delete"
        SOURCE: "."
        TARGET: "/var/www/faceid"
        REMOTE_HOST: "168.144.32.178"
        REMOTE_USER: "root"
        EXCLUDE: "/.git/, /faceid_env/, /__pycache__/, /data/uploads/, /data/embeddings/, /.github/, /Dockerfile, /docker-compose.yml"

    - name: Restart FaceID Systemd Daemon
      uses: appleboy/ssh-action@master
      with:
        host: "168.144.32.178"
        username: "root"
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          systemctl restart faceid
          systemctl status faceid --no-pager
